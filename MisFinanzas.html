<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MisFinanzas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070d1a; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

const FONTS = `@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');`;

const CATEGORIES = {
  "Alimentación": { color: "#F59E0B", icon: "🍽️" },
  "Transporte": { color: "#3B82F6", icon: "🚗" },
  "Entretenimiento": { color: "#8B5CF6", icon: "🎬" },
  "Salud": { color: "#10B981", icon: "💊" },
  "Ropa": { color: "#EC4899", icon: "👗" },
  "Hogar": { color: "#F97316", icon: "🏠" },
  "Tecnología": { color: "#06B6D4", icon: "💻" },
  "Servicios": { color: "#6366F1", icon: "📱" },
  "Educación": { color: "#84CC16", icon: "📚" },
  "Otros": { color: "#94A3B8", icon: "📦" },
};

const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CURRENT_MONTH = new Date().getMonth();
const CURRENT_YEAR = new Date().getFullYear();

// ── localStorage helpers ─────────────────────────────────────────────────────
function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

function SparkBar({ data, color = "#F59E0B" }) {
  const max = Math.max(...data, 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 40 }}>
      {data.map((v, i) => (
        <div key={i} style={{
          flex: 1, background: i === data.length - 1 ? color : color + "55",
          height: `${(v / max) * 100}%`, minHeight: 2, borderRadius: "2px 2px 0 0",
          transition: "height 0.4s ease"
        }} />
      ))}
    </div>
  );
}

function DonutChart({ data, size = 160 }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  let cumulative = 0;
  const r = 56, cx = 80, cy = 80;
  const circumference = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox="0 0 160 160">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e293b" strokeWidth={18} />
      {data.map((d, i) => {
        const pct = d.value / total;
        const dash = pct * circumference;
        const gap = circumference - dash;
        const offset = -cumulative * circumference;
        cumulative += pct;
        return (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={d.color} strokeWidth={18}
            strokeDasharray={`${dash} ${gap}`}
            strokeDashoffset={offset}
            style={{ transition: "stroke-dasharray 0.6s ease", transform: "rotate(-90deg)", transformOrigin: "80px 80px" }}
          />
        );
      })}
      <text x={cx} y={cy - 6} textAnchor="middle" fill="#f1f5f9" fontSize="11" fontFamily="DM Sans">Total</text>
      <text x={cx} y={cy + 12} textAnchor="middle" fill="#f59e0b" fontSize="15" fontWeight="600" fontFamily="DM Mono">
        ${total.toLocaleString()}
      </text>
    </svg>
  );
}

function FinanceDashboard() {
  const [tab, setTab] = useState("overview");
  const [month, setMonth] = useState(CURRENT_MONTH);

  const FRECUENCIAS = {
    diaria:    { label: "Diaria",    icon: "📅", multiplier: 30,   color: "#06B6D4" },
    semanal:   { label: "Semanal",   icon: "🗓️", multiplier: 4.33, color: "#8B5CF6" },
    quincenal: { label: "Quincenal", icon: "📆", multiplier: 2,    color: "#F59E0B" },
    mensual:   { label: "Mensual",   icon: "🗃️", multiplier: 1,    color: "#10B981" },
  };

  const toMonthly = (amount, freq) => Number(amount) * (FRECUENCIAS[freq]?.multiplier || 1);

  const [incomes, setIncomes] = useState(() => loadLS("mf_incomes", [
    { id: 1, name: "Salario", amount: 25000, type: "fijo", frecuencia: "mensual" },
  ]));
  const [newIncome, setNewIncome] = useState({ name: "", amount: "", type: "fijo", frecuencia: "mensual" });

  const [expenses, setExpenses] = useState(() => loadLS("mf_expenses", [
    { id: 1, name: "Renta", amount: 8000, type: "fijo", category: "Hogar", month: CURRENT_MONTH, frecuencia: "mensual" },
    { id: 2, name: "Netflix", amount: 219, type: "fijo", category: "Entretenimiento", month: CURRENT_MONTH, frecuencia: "mensual" },
    { id: 3, name: "Gym", amount: 600, type: "fijo", category: "Salud", month: CURRENT_MONTH, frecuencia: "mensual" },
    { id: 4, name: "Súper", amount: 3200, type: "variable", category: "Alimentación", month: CURRENT_MONTH, frecuencia: "mensual" },
    { id: 5, name: "Gasolina", amount: 1500, type: "variable", category: "Transporte", month: CURRENT_MONTH, frecuencia: "mensual" },
  ]));
  const [newExpense, setNewExpense] = useState({ name: "", amount: "", type: "variable", category: "Otros", frecuencia: "mensual", customCategory: "" });
  const [customCatInput, setCustomCatInput] = useState("");

  const [isProcessing, setIsProcessing] = useState(false);
  const [aiLog, setAiLog] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const fileRef = useRef();

  // ── Bank statements history ───────────────────────────────────────────────
  const BANKS = [
    { id: "banorte",   label: "Banorte",    color: "#ef4444", icon: "🔴" },
    { id: "bbva",      label: "BBVA",       color: "#3b82f6", icon: "🔵" },
    { id: "santander", label: "Santander",  color: "#f97316", icon: "🟠" },
    { id: "banamex",   label: "CitiBanamex",color: "#8b5cf6", icon: "🟣" },
    { id: "otros",     label: "Otros",      color: "#94a3b8", icon: "⚪" },
  ];
  const [statements, setStatements] = useState(() => loadLS("mf_statements", []));      // history of analyzed statements
  const [pendingTxs, setPendingTxs] = useState(null);    // { bank, fileName, txs } — awaiting confirm
  const [selectedBank, setSelectedBank] = useState("banorte");
  const [editingStmt, setEditingStmt] = useState(null);  // id of statement being renamed
  const [editStmtName, setEditStmtName] = useState("");

  // ── Persist to localStorage on every change ─────────────────────────────
  useEffect(() => saveLS("mf_incomes",    incomes),    [incomes]);
  useEffect(() => saveLS("mf_expenses",   expenses),   [expenses]);
  useEffect(() => saveLS("mf_statements", statements), [statements]);

  const monthExpenses = expenses.filter(e => e.month === month);
  const totalIncome = incomes.reduce((s, i) => s + toMonthly(i.amount, i.frecuencia), 0);
  const totalExpense = monthExpenses.reduce((s, e) => s + toMonthly(e.amount, e.frecuencia || "mensual"), 0);
  const balance = totalIncome - totalExpense;
  const savingsRate = totalIncome > 0 ? Math.round((balance / totalIncome) * 100) : 0;

  const expensesByCategory = Object.entries(
    monthExpenses.reduce((acc, e) => {
      acc[e.category] = (acc[e.category] || 0) + Number(e.amount);
      return acc;
    }, {})
  ).map(([cat, val]) => ({ name: cat, value: val, color: CATEGORIES[cat]?.color || "#94A3B8", icon: CATEGORIES[cat]?.icon || "📦" }))
    .sort((a, b) => b.value - a.value);

  const sparkData = [18000, 21000, 19500, 23000, 20800, totalExpense].slice(-6);

  // processStatement accepts either plain text OR { pdf: base64string }
  const processStatement = useCallback(async (input) => {
    setIsProcessing(true);
    setAiLog([]);
    try {
      const isPdf = input && typeof input === "object" && input.pdf;
      const userContent = isPdf
        ? [
            {
              type: "document",
              source: { type: "base64", media_type: "application/pdf", data: input.pdf }
            },
            {
              type: "text",
              text: `Analiza este estado de cuenta en PDF. Busca la sección "DESGLOSE DE MOVIMIENTOS" o "CARGOS, ABONOS Y COMPRAS". Extrae SOLO los cargos/gastos (montos positivos con +$), ignora pagos/abonos (montos negativos con -$). Para cada cargo extrae: nombre del comercio (limpio, sin RFC ni ciudad) y monto numérico. Clasifica cada uno en una de estas categorías: Alimentación, Transporte, Entretenimiento, Salud, Ropa, Hogar, Tecnología, Servicios, Educación, Otros. Responde SOLO con JSON válido sin markdown: {"transactions":[{"name":"Nombre limpio","amount":123.45,"category":"Categoría"}]}`
            }
          ]
        : [{ type: "text", text: `Extrae las transacciones de cargo (no abonos/pagos) de este estado de cuenta. Responde SOLO con JSON válido sin markdown ni backticks: {"transactions":[{"name":"nombre del comercio","amount":123.45,"category":"una de: Alimentación,Transporte,Entretenimiento,Salud,Ropa,Hogar,Tecnología,Servicios,Educación,Otros"}]}. Si no hay transacciones: {"transactions":[],"note":"razón"}.

${input.slice(0, 4000)}` }];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          messages: [{ role: "user", content: userContent }]
        })
      });
      const data = await response.json();

      const rawText = data.content?.map(b => b.text || "").join("") || "";

      // Strip markdown fences first, then find the JSON object
      const cleaned = rawText.replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/i, "").trim();

      // Extract the largest {...} block — handles truncated responses too
      let parsed = null;
      try {
        // Try full clean parse first
        parsed = JSON.parse(cleaned);
      } catch {
        // Find start of JSON object
        const start = cleaned.indexOf("{");
        if (start !== -1) {
          // Walk from the end backwards to find a valid closing } 
          let jsonStr = cleaned.slice(start);
          // If the JSON was truncated, close it gracefully
          while (jsonStr.length > 0) {
            try {
              parsed = JSON.parse(jsonStr);
              break;
            } catch {
              // Remove last char and try again (handles trailing truncation)
              jsonStr = jsonStr.slice(0, jsonStr.lastIndexOf("}") );
              if (!jsonStr.includes("}")) break;
              jsonStr = jsonStr + "}";
              try { parsed = JSON.parse(jsonStr); break; } catch { break; }
            }
          }
        }
      }

      // If still null, try to extract partial transactions array directly
      if (!parsed) {
        const arrStart = rawText.indexOf('"transactions"');
        const arrOpen  = rawText.indexOf("[", arrStart);
        if (arrStart !== -1 && arrOpen !== -1) {
          // Find all complete transaction objects
          const partial = rawText.slice(arrOpen);
          const objects = [];
          const re = /\{[^{}]+\}/g;
          let m;
          while ((m = re.exec(partial)) !== null) {
            try { objects.push(JSON.parse(m[0])); } catch {}
          }
          if (objects.length > 0) parsed = { transactions: objects };
        }
      }

      if (!parsed) {
        setAiLog(["⚠️ No se pudo leer la respuesta de la IA. Intenta con un texto más corto o en formato diferente."]);
        setIsProcessing(false);
        return;
      }

      const txs = parsed.transactions || [];
      if (txs.length === 0) {
        setAiLog([`⚠️ ${parsed.note || "No se encontraron transacciones en el documento"}`]);
      } else {
        // Store as pending — show summary before confirming export to expenses
        setPendingTxs({
          bank: selectedBank,
          txs: txs.map((t, i) => ({
            id: Date.now() + i,
            name: t.name,
            amount: Number(t.amount) || 0,
            category: t.category || "Otros",
          })),
        });
        setAiLog([]);
      }
    } catch (e) {
      setAiLog([`❌ Error: ${e.message}`]);
    }
    setIsProcessing(false);
  }, [month]);

  const handleFile = async (file) => {
    if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
      // Read PDF as base64 and send directly to Claude vision
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      processStatement({ pdf: base64 });
    } else {
      const text = await file.text();
      processStatement(text);
    }
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  const addIncome = () => {
    if (!newIncome.name || !newIncome.amount) return;
    setIncomes(prev => [...prev, { ...newIncome, id: Date.now() }]);
    setNewIncome({ name: "", amount: "", type: "fijo", frecuencia: "mensual" });
  };

  const addExpense = () => {
    if (!newExpense.name || !newExpense.amount) return;
    const finalCategory = newExpense.category === "Otros" && customCatInput.trim()
      ? customCatInput.trim()
      : newExpense.category;
    setExpenses(prev => [...prev, { ...newExpense, id: Date.now(), month, category: finalCategory }]);
    setNewExpense({ name: "", amount: "", type: "variable", category: "Otros", frecuencia: "mensual", customCategory: "" });
    setCustomCatInput("");
  };

  const deleteExpense = (id) => setExpenses(prev => prev.filter(e => e.id !== id));
  const deleteIncome = (id) => setIncomes(prev => prev.filter(i => i.id !== id));

  // ── Statement history helpers ────────────────────────────────────────────
  const confirmExport = (stmt) => {
    const bankInfo = BANKS.find(b => b.id === stmt.bank) || BANKS[4];
    const total = stmt.txs.reduce((s, t) => s + t.amount, 0);
    // Export as ONE single consolidated expense entry
    const singleExpense = {
      id: Date.now(),
      name: bankInfo.label,
      amount: total,
      type: "variable",
      category: "Servicios",
      frecuencia: "mensual",
      month,
      fromStatement: true,
    };
    setExpenses(prev => [...prev, singleExpense]);
    // Save to history
    setStatements(prev => [{
      id: Date.now() + 1,
      name: bankInfo.label,
      bank: stmt.bank,
      date: new Date().toLocaleDateString("es-MX"),
      month,
      txs: stmt.txs,
      total,
    }, ...prev]);
    setPendingTxs(null);
    setPasteText("");
  };

  const deleteStatement = (id) => setStatements(prev => prev.filter(s => s.id !== id));

  const startRenameStmt = (stmt) => { setEditingStmt(stmt.id); setEditStmtName(stmt.name); };
  const saveRenameStmt  = () => {
    setStatements(prev => prev.map(s => s.id === editingStmt ? { ...s, name: editStmtName } : s));
    setEditingStmt(null);
  };

  // ── Edit modal ────────────────────────────────────────────────────────────
  const [editModal, setEditModal] = useState(null);
  const [editCustomCat, setEditCustomCat] = useState("");

  const openEditExpense = (e) => {
    const isCustom = !CATEGORIES[e.category];
    setEditCustomCat(isCustom ? e.category : "");
    setEditModal({ type: "expense", data: { ...e, category: isCustom ? "Otros" : e.category } });
  };
  const openEditIncome = (i) => setEditModal({ type: "income", data: { ...i } });
  const closeEdit = () => { setEditModal(null); setEditCustomCat(""); };

  const saveEdit = () => {
    if (!editModal) return;
    if (editModal.type === "expense") {
      const finalCat = editModal.data.category === "Otros" && editCustomCat.trim()
        ? editCustomCat.trim() : editModal.data.category;
      setExpenses(prev => prev.map(e => e.id === editModal.data.id ? { ...editModal.data, category: finalCat } : e));
    } else {
      setIncomes(prev => prev.map(i => i.id === editModal.data.id ? { ...editModal.data } : i));
    }
    closeEdit();
  };

  const S = {
    root: { fontFamily: "'DM Sans', sans-serif", background: "#070d1a", minHeight: "100vh", color: "#e2e8f0" },
    header: { background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)", borderBottom: "1px solid #1e293b", padding: "18px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 },
    logo: { fontFamily: "'DM Serif Display', serif", fontSize: 24, color: "#f1f5f9", letterSpacing: "-0.5px" },
    monthBar: { display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" },
    monthBtn: (active) => ({ padding: "4px 9px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 11, fontFamily: "'DM Mono', monospace", fontWeight: 500, background: active ? "#f59e0b" : "#1e293b", color: active ? "#000" : "#94a3b8", transition: "all 0.2s" }),
    nav: { display: "flex", gap: 0, borderBottom: "1px solid #1e293b", background: "#0f172a", padding: "0 28px", overflowX: "auto" },
    navBtn: (active) => ({ padding: "13px 18px", border: "none", cursor: "pointer", background: "transparent", color: active ? "#f59e0b" : "#64748b", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, borderBottom: active ? "2px solid #f59e0b" : "2px solid transparent", transition: "all 0.2s", marginBottom: -1, whiteSpace: "nowrap" }),
    main: { padding: "24px 28px", maxWidth: 1200, margin: "0 auto" },
    grid3: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14, marginBottom: 18 },
    grid2: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 14, marginBottom: 18 },
    card: { background: "#0f172a", border: "1px solid #1e293b", borderRadius: 14, padding: "18px 20px" },
    kpiCard: (accent) => ({ background: "linear-gradient(135deg, #0f172a, #1a2540)", border: `1px solid ${accent}33`, borderRadius: 14, padding: "18px 20px", position: "relative", overflow: "hidden" }),
    kpiLabel: { fontSize: 11, color: "#64748b", fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 },
    kpiValue: (color) => ({ fontSize: 28, fontFamily: "'DM Serif Display', serif", color, marginTop: 4 }),
    kpiSub: { fontSize: 12, color: "#475569", marginTop: 2 },
    sectionTitle: { fontFamily: "'DM Serif Display', serif", fontSize: 18, color: "#f1f5f9", marginBottom: 14 },
    badge: (color) => ({ display: "inline-block", padding: "2px 8px", borderRadius: 99, fontSize: 10, fontFamily: "'DM Mono', monospace", background: color + "22", color, border: `1px solid ${color}44` }),
    input: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "'DM Sans', sans-serif", outline: "none", width: "100%", boxSizing: "border-box" },
    select: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "'DM Sans', sans-serif", outline: "none" },
    btn: (color = "#f59e0b") => ({ background: color, color: color === "#f59e0b" ? "#000" : "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }),
    row: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderRadius: 8, marginBottom: 6, background: "#1e293b", border: "1px solid #334155" },
    dropZone: (over) => ({ border: `2px dashed ${over ? "#f59e0b" : "#334155"}`, borderRadius: 12, padding: "28px", textAlign: "center", background: over ? "#f59e0b11" : "#1e293b", cursor: "pointer", transition: "all 0.2s", marginBottom: 14 }),
    logItem: (ok) => ({ padding: "6px 10px", borderRadius: 6, marginBottom: 4, background: ok ? "#10b98111" : "#ef444411", border: `1px solid ${ok ? "#10b98133" : "#ef444433"}`, fontSize: 12, fontFamily: "'DM Mono', monospace", color: "#cbd5e1" }),
    progressFill: (pct, color) => ({ height: "100%", width: `${Math.min(pct, 100)}%`, background: color, borderRadius: 99, transition: "width 0.6s ease" }),
    deleteBtn: { background: "transparent", border: "none", color: "#475569", cursor: "pointer", fontSize: 14, padding: "2px 6px" },
    editBtn: { background: "transparent", border: "1px solid #334155", borderRadius: 6, color: "#94a3b8", cursor: "pointer", fontSize: 12, padding: "3px 8px", fontFamily: "'DM Mono', monospace", transition: "all 0.15s" },
  };

  return (
    <>
      <style>{FONTS}</style>
      <div style={S.root}>
        <div style={S.header}>
          <div style={S.logo}>Mis<span style={{ color: "#f59e0b", fontStyle: "italic" }}>Finanzas</span></div>
          <div style={S.monthBar}>
            {MONTHS.map((m, i) => (
              <button key={i} style={S.monthBtn(i === month)} onClick={() => setMonth(i)}>{m}</button>
            ))}
            <span style={{ marginLeft: 6, fontSize: 12, color: "#475569", fontFamily: "'DM Mono', monospace" }}>{CURRENT_YEAR}</span>
          </div>
        </div>

        <nav style={S.nav}>
          {[["overview","📊 Resumen"],["income","💰 Ingresos"],["expenses","💸 Gastos"],["statement","🏦 Estados de Cuenta"],["historial","📂 Historial"]].map(([id, label]) => (
            <button key={id} style={S.navBtn(tab === id)} onClick={() => setTab(id)}>{label}</button>
          ))}
        </nav>

        <div style={S.main}>

          {/* ── OVERVIEW ── */}
          {tab === "overview" && (
            <>
              <div style={S.grid3}>
                {[
                  { label: "Ingresos del mes", value: `$${totalIncome.toLocaleString()}`, color: "#10b981", sub: `${incomes.length} fuente(s)`, sym: "↑" },
                  { label: "Gastos del mes", value: `$${totalExpense.toLocaleString()}`, color: "#f59e0b", sub: `${monthExpenses.length} transacciones`, sym: "↓" },
                  { label: "Balance", value: `$${Math.abs(balance).toLocaleString()}`, color: balance >= 0 ? "#3b82f6" : "#ef4444", sub: balance >= 0 ? `Ahorro ${savingsRate}%` : "⚠️ Déficit", sym: "=" },
                ].map((kpi, i) => (
                  <div key={i} style={S.kpiCard(kpi.color)}>
                    <div style={S.kpiLabel}>{kpi.label}</div>

                // Group by category
                const byCategory = pendingTxs.txs.reduce((acc, t) => {
                  acc[t.category] = acc[t.category] || { total: 0, count: 0, txs: [] };
                  acc[t.category].total += t.amount;
                  acc[t.category].count++;
                  acc[t.category].txs.push(t);
                  return acc;
                }, {});
                const sortedCats = Object.entries(byCategory).sort((a,b) => b[1].total - a[1].total);

                return (
                  <div style={{ marginBottom: 18 }}>
                    {/* Header */}
                    <div style={{ ...S.card, border: `1px solid ${bankInfo.color}44`, background: `linear-gradient(135deg, #0f172a, #1a2540)`, marginBottom: 14 }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontSize: 26 }}>{bankInfo.icon}</span>
                            <div>
                              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, color: bankInfo.color }}>{bankInfo.label}</div>
                              <div style={{ fontSize: 12, color: "#64748b", fontFamily: "'DM Mono', monospace" }}>{pendingTxs.txs.length} movimientos detectados · {MONTHS[month]} {CURRENT_YEAR}</div>
                            </div>
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 11, color: "#64748b", fontFamily: "'DM Mono', monospace" }}>TOTAL ANALIZADO</div>
                          <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 28, color: "#f59e0b" }}>${total.toLocaleString("es-MX", { maximumFractionDigits: 2 })}</div>
                        </div>
                      </div>
                    </div>

                    {/* Category summary */}
                    <div style={{ ...S.card, marginBottom: 14, border: "1px solid #1e293b" }}>
                      <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 16, color: "#f1f5f9", marginBottom: 12 }}>Resumen por categoría</div>
                      {sortedCats.map(([cat, info]) => {
                        const meta = CATEGORIES[cat] || { color: "#94a3b8", icon: "📦" };
                        const pct = (info.total / total) * 100;
                        return (
                          <div key={cat} style={{ marginBottom: 12 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                              <span style={{ fontSize: 13, color: "#e2e8f0" }}>{meta.icon} {cat} <span style={{ fontSize: 11, color: "#475569" }}>({info.count})</span></span>
                              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 13, color: meta.color }}>${info.total.toLocaleString("es-MX", { maximumFractionDigits: 2 })}</span>
                            </div>
                            <div style={{ height: 5, borderRadius: 99, background: "#1e293b", overflow: "hidden" }}>
                              <div style={{ height: "100%", width: `${pct}%`, background: meta.color, borderRadius: 99, transition: "width 0.5s ease" }} />
                            </div>
                            {/* Individual transactions */}
                            <div style={{ marginTop: 5, paddingLeft: 12 }}>
                              {info.txs.map((t, i) => (
                                <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#64748b", fontFamily: "'DM Mono', monospace", padding: "2px 0", borderBottom: i < info.txs.length - 1 ? "1px solid #1e293b" : "none" }}>
                                  <span>{t.name}</span>
                                  <span>${t.amount.toLocaleString("es-MX", { maximumFractionDigits: 2 })}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                      <div style={{ borderTop: "1px solid #334155", paddingTop: 10, marginTop: 4, display: "flex", justifyContent: "space-between" }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>Total</span>
                        <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, color: "#f59e0b", fontWeight: 700 }}>${total.toLocaleString("es-MX", { maximumFractionDigits: 2 })}</span>
                      </div>
                    </div>

                    {/* Actions */}
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => { setPendingTxs(null); setPasteText(""); }}
                        style={{ flex: 1, padding: "11px", borderRadius: 8, border: "1px solid #334155", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}>
                        Cancelar
                      </button>
                      <button onClick={() => confirmExport(pendingTxs)}
                        style={{ flex: 2, padding: "11px", borderRadius: 8, border: "none", background: "#f59e0b", color: "#000", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "'DM Sans', sans-serif" }}>
                        ✅ Exportar {pendingTxs.txs.length} gastos a {MONTHS[month]}
                      </button>
                    </div>
                  </div>
                );
              })()}

            </>
          )}

          {/* ── HISTORIAL ── */}
          {tab === "historial" && (
            <>
              <div style={S.sectionTitle}>📂 Historial de Estados de Cuenta</div>

              {statements.length === 0 ? (
                <div style={{ ...S.card, border: "1px solid #1e293b", textAlign: "center", padding: "48px 20px", color: "#475569" }}>
                  <div style={{ fontSize: 40, marginBottom: 10 }}>📂</div>
                  <div style={{ fontSize: 15, color: "#64748b" }}>Aún no has analizado ningún estado de cuenta</div>
                  <div style={{ fontSize: 12, marginTop: 6 }}>Ve a <strong style={{ color: "#f59e0b" }}>Estados de Cuenta</strong> para subir uno</div>
                </div>
              ) : (
                statements.map(stmt => {
                  const bankInfo = BANKS.find(b => b.id === stmt.bank) || BANKS[4];
                  const byCategory = stmt.txs.reduce((acc, t) => {
                    acc[t.category] = (acc[t.category] || 0) + t.amount;
                    return acc;
                  }, {});
                  const sortedCats = Object.entries(byCategory).sort((a,b) => b[1]-a[1]);
                  return (
                    <div key={stmt.id} style={{ ...S.card, marginBottom: 16, border: `1px solid ${bankInfo.color}33` }}>
                      {/* Card header */}
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1 }}>
                          <span style={{ fontSize: 26 }}>{bankInfo.icon}</span>
                          <div style={{ flex: 1 }}>
                            {editingStmt === stmt.id ? (
                              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                                <input style={{ ...S.input, padding: "5px 10px", fontSize: 14, flex: 1 }}
                                  value={editStmtName} onChange={e => setEditStmtName(e.target.value)}
                                  onKeyDown={e => e.key === "Enter" && saveRenameStmt()} autoFocus />
                                <button onClick={saveRenameStmt} style={{ ...S.btn(), padding: "5px 12px", fontSize: 12 }}>✓</button>
                                <button onClick={() => setEditingStmt(null)} style={S.deleteBtn}>✕</button>
                              </div>
                            ) : (
                              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                                <span style={{ fontSize: 16, fontWeight: 600, color: "#e2e8f0" }}>{stmt.name}</span>
                                <button onClick={() => startRenameStmt(stmt)}
                                  style={{ background: "transparent", border: "none", color: "#475569", cursor: "pointer", fontSize: 13, padding: "1px 4px" }}>✏️</button>
                              </div>
                            )}
                            <div style={{ fontSize: 11, color: "#475569", fontFamily: "'DM Mono', monospace", marginTop: 3 }}>
                              {stmt.date} · {MONTHS[stmt.month]} {CURRENT_YEAR} · {stmt.txs.length} movimientos
                            </div>
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 10, color: "#475569", fontFamily: "'DM Mono', monospace" }}>TOTAL</div>
                            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, color: bankInfo.color, fontWeight: 700 }}>
                              ${stmt.total.toLocaleString("es-MX", { maximumFractionDigits: 0 })}
                            </div>
                          </div>
                          <button onClick={() => deleteStatement(stmt.id)}
                            style={{ background: "#ef444411", border: "1px solid #ef444433", borderRadius: 8, color: "#ef4444", cursor: "pointer", fontSize: 12, padding: "6px 12px", fontFamily: "'DM Sans', sans-serif" }}>
                            🗑 Borrar
                          </button>
                        </div>
                      </div>

                      {/* Category breakdown bars */}
                      <div style={{ borderTop: "1px solid #1e293b", paddingTop: 12 }}>
                        {sortedCats.map(([cat, val]) => {
                          const meta = CATEGORIES[cat] || { color: "#94a3b8", icon: "📦" };
                          const pct = (val / stmt.total) * 100;
                          const catTxs = stmt.txs.filter(t => t.category === cat);
                          return (
                            <div key={cat} style={{ marginBottom: 10 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                                <span style={{ fontSize: 12, color: "#e2e8f0" }}>{meta.icon} {cat} <span style={{ fontSize: 10, color: "#475569" }}>({catTxs.length})</span></span>
                                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: meta.color }}>${val.toLocaleString("es-MX", { maximumFractionDigits: 0 })}</span>
                              </div>
                              <div style={{ height: 5, borderRadius: 99, background: "#1e293b", overflow: "hidden", marginBottom: 4 }}>
                                <div style={{ height: "100%", width: `${pct}%`, background: meta.color, borderRadius: 99 }} />
                              </div>
                              {catTxs.map((t, i) => (
                                <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#475569", fontFamily: "'DM Mono', monospace", padding: "1px 0 1px 10px" }}>
                                  <span>— {t.name}</span>
                                  <span>${t.amount.toLocaleString("es-MX", { maximumFractionDigits: 2 })}</span>
                                </div>
                              ))}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })
              )}
            </>
          )}
        </div>
      </div>

      {/* ── EDIT MODAL ── */}
      {editModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
          onClick={(e) => { if (e.target === e.currentTarget) closeEdit(); }}>
          <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 16, padding: "28px 28px 24px", width: "100%", maxWidth: 480, boxShadow: "0 24px 64px rgba(0,0,0,0.6)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 22 }}>
              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, color: "#f1f5f9" }}>
                {editModal.type === "expense" ? "✏️ Editar gasto" : "✏️ Editar ingreso"}
              </div>
              <button onClick={closeEdit} style={{ background: "transparent", border: "none", color: "#64748b", cursor: "pointer", fontSize: 20, lineHeight: 1 }}>✕</button>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {/* Name */}
              <div>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 }}>Concepto</div>
                <input style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "9px 12px", color: "#e2e8f0", fontSize: 14, fontFamily: "'DM Sans', sans-serif", outline: "none", width: "100%", boxSizing: "border-box" }}
                  value={editModal.data.name}
                  onChange={e => setEditModal(m => ({ ...m, data: { ...m.data, name: e.target.value } }))} />
              </div>

              {/* Amount */}
              <div>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 }}>Monto ($)</div>
                <input type="number" style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "9px 12px", color: "#e2e8f0", fontSize: 14, fontFamily: "'DM Mono', monospace", outline: "none", width: "100%", boxSizing: "border-box" }}
                  value={editModal.data.amount}
                  onChange={e => setEditModal(m => ({ ...m, data: { ...m.data, amount: e.target.value } }))} />
              </div>

              {/* Type */}
              <div>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 }}>Tipo</div>
                <div style={{ display: "flex", gap: 8 }}>
                  {["fijo","variable"].map(t => (
                    <button key={t} onClick={() => setEditModal(m => ({ ...m, data: { ...m.data, type: t } }))}
                      style={{ flex: 1, padding: "8px", borderRadius: 8, border: `1px solid ${editModal.data.type === t ? (t === "fijo" ? "#10b981" : "#f59e0b") : "#334155"}`, background: editModal.data.type === t ? (t === "fijo" ? "#10b98122" : "#f59e0b22") : "#1e293b", color: editModal.data.type === t ? (t === "fijo" ? "#10b981" : "#f59e0b") : "#64748b", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans', sans-serif", fontWeight: 500, transition: "all 0.15s" }}>
                      {t === "fijo" ? "🔒 Fijo" : "🔄 Variable"}
                    </button>
                  ))}
                </div>
              </div>

              {/* Frecuencia */}
              <div>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 }}>Frecuencia</div>
                <div style={{ display: "flex", gap: 8 }}>
                  {Object.entries(FRECUENCIAS).map(([key, f]) => (
                    <button key={key} onClick={() => setEditModal(m => ({ ...m, data: { ...m.data, frecuencia: key } }))}
                      style={{ flex: 1, padding: "7px 4px", borderRadius: 8, border: `1px solid ${editModal.data.frecuencia === key ? f.color : "#334155"}`, background: editModal.data.frecuencia === key ? f.color + "22" : "#1e293b", color: editModal.data.frecuencia === key ? f.color : "#64748b", cursor: "pointer", fontSize: 11, fontFamily: "'DM Mono', monospace", transition: "all 0.15s", textAlign: "center" }}>
                      <div>{f.icon}</div>
                      <div style={{ marginTop: 2 }}>{f.label}</div>
                    </button>
                  ))}
                </div>
                {editModal.data.amount > 0 && editModal.data.frecuencia !== "mensual" && (
                  <div style={{ marginTop: 8, padding: "6px 10px", background: "#f59e0b11", border: "1px solid #f59e0b33", borderRadius: 6, fontSize: 11, color: "#f59e0b", fontFamily: "'DM Mono', monospace" }}>
                    💡 Equivalente mensual: ${toMonthly(editModal.data.amount, editModal.data.frecuencia).toLocaleString("es-MX", { maximumFractionDigits: 0 })}
                  </div>
                )}
              </div>

              {/* Category — only for expenses */}
              {editModal.type === "expense" && (
                <div>
                  <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 }}>Categoría</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6 }}>
                    {Object.entries(CATEGORIES).map(([cat, meta]) => (
                      <button key={cat} onClick={() => { setEditModal(m => ({ ...m, data: { ...m.data, category: cat } })); if (cat !== "Otros") setEditCustomCat(""); }}
                        style={{ padding: "7px 4px", borderRadius: 8, border: `1px solid ${editModal.data.category === cat ? meta.color : "#334155"}`, background: editModal.data.category === cat ? meta.color + "22" : "#1e293b", color: editModal.data.category === cat ? meta.color : "#64748b", cursor: "pointer", fontSize: 10, fontFamily: "'DM Sans', sans-serif", textAlign: "center", transition: "all 0.15s" }}>
                        <div style={{ fontSize: 16 }}>{meta.icon}</div>
                        <div style={{ marginTop: 2, lineHeight: 1.2 }}>{cat}</div>
                      </button>
                    ))}
                  </div>

                  {editModal.data.category === "Otros" && (
                    <div style={{ marginTop: 10 }}>
                      <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4, fontFamily: "'DM Mono', monospace" }}>NOMBRE PERSONALIZADO <span style={{ color: "#475569" }}>(# y letras, máx. 12)</span></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <input style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "7px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "'DM Mono', monospace", outline: "none", flex: 1 }}
                          placeholder="#MiCategoria" maxLength={12} value={editCustomCat}
                          onChange={e => setEditCustomCat(e.target.value.replace(/[^#a-zA-ZáéíóúÁÉÍÓÚñÑüÜ]/g, "").slice(0, 12))} />
                        <span style={{ fontSize: 11, color: editCustomCat.length >= 12 ? "#ef4444" : "#475569", fontFamily: "'DM Mono', monospace" }}>{editCustomCat.length}/12</span>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Actions */}
            <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
              <button onClick={closeEdit} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #334155", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}>Cancelar</button>
              <button onClick={saveEdit} style={{ flex: 2, padding: "10px", borderRadius: 8, border: "none", background: "#f59e0b", color: "#000", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "'DM Sans', sans-serif" }}>Guardar cambios</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FinanceDashboard />);
  </script>
</body>
</html>
