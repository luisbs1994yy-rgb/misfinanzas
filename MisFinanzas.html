async function saveLocalTransaction(transaction) {
  try {
    const txs = JSON.parse(localStorage.getItem('misfinanzas_txs') || '[]');
    txs.push({ ...transaction, id: Date.now(), local: true });
    localStorage.setItem('misfinanzas_txs', JSON.stringify(txs));
    return true;
  } catch (error) {
    console.error("Error saving locally:", error);
    return false;
  }
}

async function insertTransaction(transaction) {
  // Primero guardar localmente (garantizado)
  const localSaved = await saveLocalTransaction(transaction);
  
  // Intentar guardar en Supabase (opcional)
  try {
    const { data, error } = await supabaseClient
      .from('transactions')
      .insert([{
        name: transaction.name,
        amount: Number(transaction.amount),
        category: transaction.category,
        bank: transaction.bank || null,
        month: transaction.month,
        year: transaction.year,
      }]);
    
    if (error) console.warn("Supabase warning:", error);
    return data;
  } catch (error) {
    console.warn("Supabase sync failed, but data saved locally:", error);
    return null;
  }
}

async function fetchTransactions() {
  try {
    // Intentar traer de Supabase primero
    const { data, error } = await supabaseClient
      .from('transactions')
      .select('*')
      .order('date_created', { ascending: false });
    
    if (!error && data) return data;
  } catch (error) {
    console.warn("Supabase fetch failed, using local data");
  }
  
  // Fallback a localStorage
  try {
    return JSON.parse(localStorage.getItem('misfinanzas_txs') || '[]');
  } catch {
    return [];
  }
}


// ── PDF Processing with regex patterns ─────────────────────────────────
function toTitleCase(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

function extractTransactionsFromText(text) {
  const transactions = [];
  
  // Dividir en líneas
  const lines = text.split(/\n/);
  
  // Buscar sección de transacciones
  let inSection = false;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    
    // Detectar inicio de sección
    if (line.includes("CARGOS, ABONOS Y COMPRAS REGULARES")) {
      inSection = true;
      continue;
    }
    
    // Detectar fin (Total cargos o siguiente sección)
    if (inSection && (line.includes("Total cargos") || line.includes("Total abonos") || line === "")) {
      if (line.includes("Total")) break;
      continue;
    }
    
    if (!inSection) continue;
    
    // Saltar líneas muy cortas
    if (line.length < 10) continue;
    
    // Buscar líneas con formato de transacción
    // Patrón: DD-MMM-YYYY DD-MMM-YYYY DESCRIPCIÓN +$MONTO
    const match = line.match(/(\d{2}-[A-Z]{3}-\d{4})\s+(\d{2}-[A-Z]{3}-\d{4})\s+(.+?)\s+([+\-]?\$?[\d,]+\.\d{2})\s*$/);
    
    if (!match) continue;
    
    const montoStr = match[4];
    const monto = parseFloat(montoStr.replace(/[^\d.]/g, ""));
    
    // Saltar negativos (pagos)
    if (montoStr.includes("-")) continue;
    
    // Saltar si está fuera de rango
    if (monto <= 0 || monto > 999999) continue;
    
    // Descripción
    let desc = match[3].trim().toUpperCase().slice(0, 80);
    
    // Saltar descripciones malas
    if (desc.match(/PAGO|TOTAL|INTERESES|COMISIONE|IVA/i)) continue;
    
    if (desc.length > 3) {
      // Evitar duplicados
      const key = desc + "|" + monto;
      if (!transactions.some(t => (t.name + "|" + t.amount) === key)) {
        transactions.push({ name: desc, amount: monto });
      }
    }
  }
  
  return transactions.slice(0, 100);
}

function classifyTransaction(name) {
  const keywords = {
    "Alimentación": ["walmart", "soriana", "oxxo", "superama", "restaurante", "burger", "pizza", "cafe", "comida"],
    "Transporte": ["uber", "taxi", "lyft", "gasolina", "pemex", "parking", "estacionamiento"],
    "Entretenimiento": ["cine", "spotify", "netflix", "cinema", "tickets", "concierto"],
    "Salud": ["farmacia", "hospital", "doctor", "medicina", "gym", "fitness"],
    "Ropa": ["zara", "h&m", "forever", "shein", "boutique", "ropa"],
    "Hogar": ["home depot", "ikea", "ferreterí", "tiendas"],
    "Tecnología": ["apple", "amazon", "best buy", "laptop", "celular", "iphone"],
    "Servicios": ["electric", "agua", "internet", "telefónica", "gas", "servicios"],
    "Educación": ["udemy", "coursera", "escuela", "colegio"],
  };

  const nameLower = name.toLowerCase();
  for (const [category, words] of Object.entries(keywords)) {
    if (words.some(word => nameLower.includes(word))) {
      return category;
    }
  }
  return "Otros";
}

function SparkBar({ data, color = "#F59E0B" }) {
  const max = Math.max(...data, 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 40 }}>
      {data.map((v, i) => (
        <div key={i} style={{
          flex: 1, background: i === data.length - 1 ? color : color + "55",
          height: `${(v / max) * 100}%`, minHeight: 2, borderRadius: "2px 2px 0 0",
          transition: "height 0.4s ease"
        }} />
      ))}
    </div>
  );
}

function DonutChart({ data, size = 160 }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  let cumulative = 0;
  const r = 56, cx = 80, cy = 80;
  const circumference = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox="0 0 160 160">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e293b" strokeWidth={18} />
      {data.map((d, i) => {
        const pct = d.value / total;
        const dash = pct * circumference;
        const gap = circumference - dash;
        const offset = -cumulative * circumference;
        cumulative += pct;
        return (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={d.color} strokeWidth={18}
            strokeDasharray={`${dash} ${gap}`}
            strokeDashoffset={offset}
            style={{ transition: "stroke-dasharray 0.6s ease", transform: "rotate(-90deg)", transformOrigin: "80px 80px" }}
          />
        );
      })}
      <text x={cx} y={cy - 6} textAnchor="middle" fill="#f1f5f9" fontSize="11" fontFamily="DM Sans">Total</text>
      <text x={cx} y={cy + 12} textAnchor="middle" fill="#f59e0b" fontSize="15" fontWeight="600" fontFamily="DM Mono">
        ${total.toLocaleString()}
      </text>
    </svg>
  );
}

    header: { background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)", borderBottom: "1px solid #1e293b", padding: "18px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 },
    logo: { fontFamily: "'DM Serif Display', serif", fontSize: 24, color: "#f1f5f9", letterSpacing: "-0.5px" },
    monthBar: { display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" },
    monthBtn: (active) => ({ padding: "4px 9px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 11, fontFamily: "'DM Mono', monospace", fontWeight: 500, background: active ? "#f59e0b" : "#1e293b", color: active ? "#000" : "#94a3b8", transition: "all 0.2s" }),
    nav: { display: "flex", gap: 0, borderBottom: "1px solid #1e293b", background: "#0f172a", padding: "0 28px", overflowX: "auto" },
    navBtn: (active) => ({ padding: "13px 18px", border: "none", cursor: "pointer", background: "transparent", color: active ? "#f59e0b" : "#64748b", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, borderBottom: active ? "2px solid #f59e0b" : "2px solid transparent", transition: "all 0.2s", marginBottom: -1, whiteSpace: "nowrap" }),
    main: { padding: "24px 28px", maxWidth: 1200, margin: "0 auto" },
    grid3: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14, marginBottom: 18 },
    grid2: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 14, marginBottom: 18 },
    card: { background: "#0f172a", border: "1px solid #1e293b", borderRadius: 14, padding: "18px 20px" },
    kpiCard: (accent) => ({ background: "linear-gradient(135deg, #0f172a, #1a2540)", border: `1px solid ${accent}33`, borderRadius: 14, padding: "18px 20px", position: "relative", overflow: "hidden" }),
    kpiLabel: { fontSize: 11, color: "#64748b", fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 },
    kpiValue: (color) => ({ fontSize: 28, fontFamily: "'DM Serif Display', serif", color, marginTop: 4 }),
    sectionTitle: { fontFamily: "'DM Serif Display', serif", fontSize: 18, color: "#f1f5f9", marginBottom: 14 },
    input: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 13, fontFamily: "'DM Sans', sans-serif", outline: "none", width: "100%", boxSizing: "border-box" },
    btn: (color = "#f59e0b") => ({ background: color, color: color === "#f59e0b" ? "#000" : "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }),
    dropZone: (over) => ({ border: `2px dashed ${over ? "#f59e0b" : "#334155"}`, borderRadius: 12, padding: "28px", textAlign: "center", background: over ? "#f59e0b11" : "#1e293b", cursor: "pointer", transition: "all 0.2s", marginBottom: 14 }),
    logItem: (ok) => ({ padding: "6px 10px", borderRadius: 6, marginBottom: 4, background: ok ? "#10b98111" : "#ef444411", border: `1px solid ${ok ? "#10b98133" : "#ef444433"}`, fontSize: 12, fontFamily: "'DM Mono', monospace", color: "#cbd5e1" }),
  };

  return (
    <>
      <style>{FONTS}</style>
      <div style={S.root}>
        <div style={S.header}>
          <div style={S.logo}>Mis<span style={{ color: "#f59e0b", fontStyle: "italic" }}>Finanzas</span></div>
          <div style={S.monthBar}>
            {MONTHS.map((m, i) => (
              <button key={i} style={S.monthBtn(i === month)} onClick={() => setMonth(i)}>{m}</button>
            ))}
            <span style={{ marginLeft: 6, fontSize: 12, color: "#475569", fontFamily: "'DM Mono', monospace" }}>{CURRENT_YEAR}</span>
          </div>
        </div>

        <nav style={S.nav}>
          {[["overview","📊 Resumen"],["income","💰 Ingresos"],["expenses","💸 Gastos"]].map(([id, label]) => (
            <button key={id} style={S.navBtn(tab === id)} onClick={() => setTab(id)}>{label}</button>
          ))}
        </nav>

        <div style={S.main}>

          {/* ── OVERVIEW ── */}
          {tab === "overview" && (
            <>
              <div style={S.grid3}>
                {[
                  { label: "Ingresos del mes", value: `$${totalIncome.toLocaleString()}`, color: "#10b981", sub: `${incomes.length} fuente(s)`, sym: "↑" },
                  { label: "Gastos del mes", value: `$${totalExpense.toLocaleString()}`, color: "#f59e0b", sub: `${monthTransactions.length} transacciones`, sym: "↓" },
                  { label: "Balance", value: `$${Math.abs(balance).toLocaleString()}`, color: balance >= 0 ? "#3b82f6" : "#ef4444", sub: balance >= 0 ? `Ahorro ${savingsRate}%` : "⚠️ Déficit", sym: "=" },
                ].map((kpi, i) => (
                  <div key={i} style={S.kpiCard(kpi.color)}>
                    <div style={S.kpiLabel}>{kpi.label}</div>
                    <div style={S.kpiValue(kpi.color)}>{kpi.value}</div>
                    <div style={{ fontSize: 12, color: "#475569", marginTop: 2 }}>{kpi.sub}</div>
                    <div style={{ position: "absolute", right: 14, top: 14, opacity: 0.07, fontSize: 60 }}>{kpi.sym}</div>
                  </div>
                ))}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(360px, 1fr))", gap: 14 }}>
                <div style={S.card}>
                  <div style={S.sectionTitle}>Gastos por categoría</div>
                  <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                    <DonutChart data={expensesByCategory.slice(0, 6)} />
                    <div style={{ flex: 1, minWidth: 160 }}>
                      {expensesByCategory.slice(0, 7).map((c, i) => (
                        <div key={i} style={{ marginBottom: 8 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                            <span>{c.icon} {c.name}</span>
                            <span style={{ fontFamily: "'DM Mono', monospace", color: c.color }}>${c.value.toLocaleString()}</span>
                          </div>
                          <div style={{ height: 5, borderRadius: 99, background: "#1e293b", overflow: "hidden" }}>
                            <div style={{ height: "100%", width: `${(c.value / totalExpense) * 100}%`, background: c.color, borderRadius: 99, transition: "width 0.6s ease" }} />
                          </div>
                        </div>
                      ))}
                      {expensesByCategory.length === 0 && <div style={{ color: "#475569", fontSize: 13 }}>Sin gastos</div>}
                    </div>
                  </div>
                </div>

                <div style={S.card}>
                  <div style={S.sectionTitle}>🔒 Gastos Fijos</div>
                  <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                    <DonutChart data={expensesByTypeFixed.slice(0, 6)} />
                    <div style={{ flex: 1, minWidth: 160 }}>
                      <div style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 8, fontWeight: "bold" }}>
                          <span>Total Mensual</span>
                          <span style={{ fontFamily: "'DM Mono', monospace", color: "#6366f1" }}>${gastosFijos.toLocaleString("es-MX", { maximumFractionDigits: 0 })}</span>
                        </div>
                      </div>
                      {expensesByTypeFixed.slice(0, 5).map((c, i) => (
                        <div key={i} style={{ marginBottom: 8 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                            <span>{c.icon} {c.name}</span>
                            <span style={{ fontFamily: "'DM Mono', monospace", color: c.color }}>${c.value.toLocaleString("es-MX", { maximumFractionDigits: 0 })}</span>
                          </div>
                          <div style={{ height: 5, borderRadius: 99, background: "#1e293b", overflow: "hidden" }}>
                            <div style={{ height: "100%", width: `${(c.value / gastosFijos) * 100}%`, background: c.color, borderRadius: 99, transition: "width 0.6s ease" }} />
                          </div>
                        </div>
                      ))}
                      {expensesByTypeFixed.length === 0 && <div style={{ color: "#475569", fontSize: 13 }}>Sin gastos fijos</div>}
                    </div>
                  </div>
                </div>

                <div style={S.card}>
                  <div style={S.sectionTitle}>📊 Gastos Variables</div>
                  <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                    <DonutChart data={expensesByTypeVariable.slice(0, 6)} />
                    <div style={{ flex: 1, minWidth: 160 }}>
                      <div style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 8, fontWeight: "bold" }}>
                          <span>Total Mensual</span>
                          <span style={{ fontFamily: "'DM Mono', monospace", color: "#f59e0b" }}>${gastosVariables.toLocaleString("es-MX", { maximumFractionDigits: 0 })}</span>
                        </div>
                      </div>
                      {expensesByTypeVariable.slice(0, 5).map((c, i) => (
                        <div key={i} style={{ marginBottom: 8 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                            <span>{c.icon} {c.name}</span>
                            <span style={{ fontFamily: "'DM Mono', monospace", color: c.color }}>${c.value.toLocaleString("es-MX", { maximumFractionDigits: 0 })}</span>
                          </div>
                          <div style={{ height: 5, borderRadius: 99, background: "#1e293b", overflow: "hidden" }}>
                            <div style={{ height: "100%", width: `${(c.value / gastosVariables) * 100}%`, background: c.color, borderRadius: 99, transition: "width 0.6s ease" }} />
                          </div>
                        </div>
                      ))}
                      {expensesByTypeVariable.length === 0 && <div style={{ color: "#475569", fontSize: 13 }}>Sin gastos variables</div>}
                    </div>
                  </div>
                </div>
              </div>

              {/* Panel de Test - Verificar Supabase */}
              <div style={{ ...S.card, border: "1px solid #8b5cf644", background: "#8b5cf611", marginTop: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <div style={S.sectionTitle}>🧪 Test Supabase</div>
                  <button onClick={async () => {
                    setAiLog(prev => [...prev.slice(-4), "⏳ Verificando conexión..."]);
                    try {
                      const response = await fetch(`${SUPABASE_URL}/rest/v1/transactions?select=count()`, {
                        headers: { "Authorization": `Bearer ${SUPABASE_KEY}` }
                      });
                      const data = await response.json();
                      setAiLog(prev => [...prev.slice(-4), `✅ Conexión OK | Total transacciones en BD: ${data[0]?.count || 0}`]);
                    } catch (err) {
                      setAiLog(prev => [...prev.slice(-4), `❌ Error: ${err.message}`]);
                    }
                  }} style={{ ...S.btn(), padding: "6px 12px", fontSize: 11 }}>
                    Verificar BD
                  </button>
                </div>
                <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
                  <div>📊 Ingresos locales: <strong>{incomes.length}</strong></div>
                  <div>📈 Gastos locales: <strong>{expenses.length}</strong></div>
                  <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #8b5cf633" }}>
                    {aiLog.slice(-3).map((log, i) => (
                      <div key={i} style={{ fontSize: 11, color: log.includes("✅") ? "#10b981" : log.includes("❌") ? "#ef4444" : "#64748b", marginBottom: 4 }}>
                        {log}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </>
          )}

          {/* ── INGRESOS ── */}
          {tab === "income" && (
            <>
              <div style={S.sectionTitle}>Fuentes de ingreso</div>
              <div style={{ ...S.card, marginBottom: 18 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto auto auto", gap: 10, alignItems: "end", flexWrap: "wrap" }}>
                  <div>
                    <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4, fontFamily: "'DM Mono', monospace" }}>CONCEPTO</div>
                    <input style={S.input} placeholder="Ej. Salario..." value={newIncome.name} onChange={e => setNewIncome(p => ({ ...p, name: toTitleCase(e.target.value) }))} />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4, fontFamily: "'DM Mono', monospace" }}>MONTO</div>
                    <input style={{ ...S.input, width: 120 }} type="number" placeholder="0.00" value={newIncome.amount} onChange={e => setNewIncome(p => ({ ...p, amount: e.target.value }))} />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4, fontFamily: "'DM Mono', monospace" }}>TIPO</div>
                    <select style={{ ...S.input, width: 100 }} value={newIncome.type} onChange={e => setNewIncome(p => ({ ...p, type: e.target.value }))}>
                      <option value="fijo">Fijo</option>
                      <option value="variable">Variable</option>
                    </select>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4, fontFamily: "'DM Mono', monospace" }}>FRECUENCIA</div>
                    <select style={{ ...S.input, width: 100 }} value={newIncome.frecuencia} onChange={e => setNewIncome(p => ({ ...p, frecuencia: e.target.value }))}>
                      {Object.entries(FRECUENCIAS).map(([key, f]) => (
                        <option key={key} value={key}>{f.label}</option>
                      ))}
                    </select>
                  </div>
                  <button style={{ ...S.btn(), marginTop: 20 }} onClick={addIncome}>+ Agregar</button>
                </div>
              </div>
              {incomes.map(i => {
                const monthlyValue = toMonthly(Number(i.amount), i.frecuencia);
                const freq = FRECUENCIAS[i.frecuencia];
                return (
                  <div key={i.id} style={{ ...S.card, marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px", borderLeft: `3px solid #10b981` }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <span style={{ fontSize: 18 }}>💰</span>
                        <strong style={{ color: "#e2e8f0" }}>{i.name}</strong>
                        <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "#10b98122", color: "#10b981", fontWeight: 600 }}>
                          {freq?.icon} {freq?.label}
                        </span>
                      </div>
                    </div>
                    <div style={{ textAlign: "right", marginRight: 12 }}>
                      <div style={{ fontFamily: "'DM Mono', monospace", color: "#10b981", fontWeight: 600, fontSize: 13 }}>
                        +${monthlyValue.toLocaleString("es-MX", { maximumFractionDigits: 2 })}
                      </div>
                      <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>
                        {i.frecuencia === "mensual" ? "Mensual" : `${freq?.label} • +$${Number(i.amount).toLocaleString()}`}
                      </div>
                    </div>
                    <button style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 16 }} onClick={() => deleteIncome(i.id)}>✕</button>
                  </div>
                );
              })}
            </>
          )}

          {/* ── GASTOS ── */}
          {tab === "expenses" && (
            <>
              <div style={S.sectionTitle}>Gastos — {MONTHS[month]} {CURRENT_YEAR}</div>
              
              {/* Formulario compacto en una línea */}
              <div style={{ ...S.card, marginBottom: 18 }}>
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1.2fr 1.2fr 1.2fr auto", gap: 10, alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 10, color: "#64748b", marginBottom: 3, fontFamily: "'DM Mono', monospace" }}>CONCEPTO</div>
                    <input style={S.input} placeholder="Ej: Renta, Uber..." value={newExpense.name} onChange={e => setNewExpense(p => ({ ...p, name: toTitleCase(e.target.value) }))} />
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: "#64748b", marginBottom: 3, fontFamily: "'DM Mono', monospace" }}>MONTO</div>
                    <input style={S.input} type="number" placeholder="0.00" value={newExpense.amount} onChange={e => setNewExpense(p => ({ ...p, amount: e.target.value }))} />
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: "#64748b", marginBottom: 3, fontFamily: "'DM Mono', monospace" }}>TIPO</div>
                    <select style={S.input} value={newExpense.type} onChange={e => setNewExpense(p => ({ ...p, type: e.target.value }))}>
                      <option value="fijo">🔒 Fijo</option>
                      <option value="variable">📊 Variable</option>
                    </select>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: "#64748b", marginBottom: 3, fontFamily: "'DM Mono', monospace" }}>FRECUENCIA</div>
                    <select style={S.input} value={newExpense.frecuencia} onChange={e => setNewExpense(p => ({ ...p, frecuencia: e.target.value }))}>
                      <option value="diaria">📅 Diaria</option>
                      <option value="semanal">🗓️ Semanal</option>
                      <option value="quincenal">📆 Quincenal</option>
                      <option value="mensual">🗃️ Mensual</option>
                    </select>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: "#64748b", marginBottom: 3, fontFamily: "'DM Mono', monospace" }}>CATEGORÍA</div>
                    <select style={S.input} value={newExpense.category} onChange={e => setNewExpense(p => ({ ...p, category: e.target.value }))}>
                      {Object.keys(CATEGORIES).map(c => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <button style={{ ...S.btn(), height: 40, marginTop: 18 }} onClick={addExpense}>+ Agregar</button>
                </div>
              </div>
              {expenses.map(e => (
                <div key={e.id} style={{ ...S.card, padding: "12px 14px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: `3px solid ${CATEGORIES[e.category]?.color || "#94A3B8"}` }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 18 }}>{CATEGORIES[e.category]?.icon || "📦"}</span>
                      {editingId === e.id ? (
                        <input 
                          type="text"
                          value={e.name}
                          onChange={(evt) => setExpenses(prev => prev.map(x => x.id === e.id ? { ...x, name: toTitleCase(evt.target.value) } : x))}
                          style={{ background: "#1e293b", border: "1px solid #334155", color: "white", fontSize: 16, fontWeight: "bold", fontFamily: "inherit", padding: "4px 8px", borderRadius: 4, outline: "none" }}
                          autoFocus
                        />
                      ) : (
                        <strong>{e.name}</strong>
                      )}
                      {editingId === e.id ? (
                        <select 
                          value={e.type}
                          onChange={(evt) => setExpenses(prev => prev.map(x => x.id === e.id ? { ...x, type: evt.target.value } : x))}
                          style={{ fontSize: 10, padding: "4px 6px", borderRadius: 4, background: "#1e293b", border: "1px solid #334155", color: e.type === "fijo" ? "#6366f1" : "#f59300", fontWeight: 600, cursor: "pointer" }}>
                          <option value="fijo">🔒 Fijo</option>
                          <option value="variable">📊 Variable</option>
                        </select>
                      ) : (
                        <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: e.type === "fijo" ? "#6366f122" : "#f5931122", color: e.type === "fijo" ? "#6366f1" : "#f59300", fontWeight: 600 }}>
                          {e.type === "fijo" ? "🔒 Fijo" : "📊 Variable"}
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize: 11, color: "#64748b", display: "flex", gap: 12 }}>
                      {editingId === e.id ? (
                        <>
                          <select 
                            value={e.category}
                            onChange={(evt) => setExpenses(prev => prev.map(x => x.id === e.id ? { ...x, category: evt.target.value } : x))}
                            style={{ background: "#1e293b", border: "1px solid #334155", color: "#64748b", fontSize: 11, fontFamily: "inherit", padding: "4px 6px", borderRadius: 4, outline: "none", cursor: "pointer" }}>
                            {Object.keys(CATEGORIES).map(c => <option key={c} value={c}>{c}</option>)}
                          </select>
                          <select 
                            value={e.frecuencia}
                            onChange={(evt) => setExpenses(prev => prev.map(x => x.id === e.id ? { ...x, frecuencia: evt.target.value } : x))}
                            style={{ background: "#1e293b", border: "1px solid #334155", color: "#64748b", fontSize: 11, fontFamily: "inherit", padding: "4px 6px", borderRadius: 4, outline: "none", cursor: "pointer" }}>
                            <option value="diaria">📅 Diaria</option>
                            <option value="semanal">🗓️ Semanal</option>
                            <option value="quincenal">📆 Quincenal</option>
                            <option value="mensual">🗃️ Mensual</option>
                          </select>
                        </>
                      ) : (
                        <>
                          <span>{e.category}</span>
                          <span>{FRECUENCIAS[e.frecuencia]?.icon} {FRECUENCIAS[e.frecuencia]?.label}</span>
                        </>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 220 }}>
                    <div style={{ textAlign: "right" }}>
                      {editingId === e.id ? (
                        <input 
                          type="number"
                          value={e.amount}
                          onChange={(evt) => setExpenses(prev => prev.map(x => x.id === e.id ? { ...x, amount: evt.target.value } : x))}
                          style={{ background: "#1e293b", border: "1px solid #334155", color: "#f59e0b", fontSize: 14, fontWeight: "600", fontFamily: "'DM Mono', monospace", padding: "4px 8px", borderRadius: 4, outline: "none", width: 100, textAlign: "right" }}
                        />
                      ) : (
                        <div style={{ fontFamily: "'DM Mono', monospace", color: "#f59e0b", fontWeight: 600 }}>-${Number(e.amount).toLocaleString()}</div>
                      )}
                      <div style={{ fontSize: 10, color: "#64748b" }}>Mensual: -${toMonthly(e.amount, e.frecuencia).toLocaleString("es-MX", { maximumFractionDigits: 2 })}</div>
                    </div>
                    <button style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 16, padding: "4px 8px" }} onClick={() => setEditingId(editingId === e.id ? null : e.id)} title="Editar">✏️</button>
                    <button style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 16, padding: "4px 8px" }} onClick={() => deleteExpense(e.id)} title="Eliminar">✕</button>
                  </div>
                </div>
              ))}
            </>
          )}

          {/* ── ESTADOS DE CUENTA ── */}


        </div>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FinanceDashboard />);
  </script>
</body>
</html>
